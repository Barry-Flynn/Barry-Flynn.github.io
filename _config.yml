# Hexo Configuration（Hexo配置）
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site（网站）
title: 百里飞洋 #丨Barry Flynn # 标题（若主题配置中没有额外定义，将会在导航栏左上角显示）
subtitle: '个人博客主页' # 副标题（浏览器标签名称上显示）
description: '百里飞洋（BarryFlynn）的个人博客主页' # 说明、描述（若主题配置中没有额外定义，将会在头像下显示这句话）
keywords: 百里飞洋,博客 # 关键词
author: 百里飞洋丨Barry Flynn # 作者（会在头像下显示）
language: zh-CN # 语言
timezone: '' # 时区

# URL（统一资源定位地址）
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: https://barry-flynn.github.io/
permalink: :year/:month/:day/:title/ # 永久链接
permalink_defaults: # 永久链接默认值
pretty_urls:
  trailing_index: true # 设置为false可从永久链接中删除尾部的“index.html” （Set to false to remove trailing 'index.html' from permalinks）
  trailing_html: true # 设置为false可从永久链接中删除尾部“.html” （Set to false to remove trailing '.html' from permalinks）

# Directory （目录）
source_dir: source # 源目录
public_dir: public # 公共目录
tag_dir: tags # 标签目录
archive_dir: archives # 档案目录
category_dir: categories # 类别目录
code_dir: downloads/code # 代码目录
i18n_dir: :lang # i18n目录
skip_render: # 跳过渲染

# Writing（写作）
new_post_name: :title.md # 新帖子文件名（File name of new posts）
default_layout: post # 默认布局
titlecase: false # 标题库（将标题转换为标题库Transform title into titlecase）
external_link:
  enable: true # 启用（在新选项卡打开外部链接Open external links in new tab）
  field: site # 区域（应用于整个站点Apply to the whole site）
  exclude: '' # 排除
filename_case: 0 # 文件名大小写
render_drafts: false # 渲染草稿
post_asset_folder: false # 发布资产文件夹
relative_link: false # 相对链接
future: true # 未来
highlight:
  enable: true  # 启用突出功能
  line_number: true # 行号
  auto_detect: false # 自动监测
  tab_replace: '' # 选项卡替换
  wrap: true # 包装
  hljs: false 
prismjs:
  enable: false # 启用
  preprocess: true # 预处理
  line_number: true # 行号
  tab_replace: '' # 选项卡替换

# Home page setting（主页设置）
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator: 
  path: '' #路径：博客索引页的根路径。（默认值=“”）
  per_page: 10 #每页：每页显示的帖子。（0=禁用分页）
  order_by: -date #订购人：发布订单。（默认情况下，订单按日期递减）

# Category & Tag（类别和标签）
default_category: uncategorized # 默认类别：未分类
category_map: # 类别地图
tag_map: # 标签地图

# Metadata elements （元数据元素）
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true # meta生成器：启用

# Date / Time format （日期/时间 格式）
## Hexo uses Moment.js to parse and display date（Hexo使用Moment.js解析和显示日期）
## You can customize the date format as defined in（您可以自定义中定义的日期格式）
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD # 日期格式
time_format: HH:mm:ss # 时间单位格式
## updated_option supports 'mtime', 'date', 'empty' （更新的选项支持：后边那仨）
updated_option: 'mtime'

# Pagination（分页）
## Set per_page to 0 to disable pagination（将每页设置为0可以禁用分页）
per_page: 10 # 每页
pagination_dir: page # 分页目录

# Include / Exclude file(s)  （包括/排除 文件）
## include:/exclude: options only apply to the 'source/' folder（仅适用于“source/”文件夹）
include:
exclude:
ignore:

# Extensions（扩展）
## Plugins: https://hexo.io/plugins/ （插件）
## Themes: https://hexo.io/themes/ （主题）
theme: butterfly

# Deployment（部署）
## Docs: https://hexo.io/docs/one-command-deployment
deploy:
  type: git
  repo: https://github.com/Barry-Flynn/Barry-Flynn.github.io #仓库地址
  branch: main # 默认使用 master 分支(Github现在改名为main分支)
  # message: Update Hexo Static Content # 你可以自定义此次部署更新的说明
